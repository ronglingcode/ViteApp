# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: firebase-hosting-live
      cancel-in-progress: false
    steps:
      - name: Check deploy lock window
        id: deploy_window
        run: |
          ny_day=$(TZ=America/New_York date +%u)
          ny_time=$(TZ=America/New_York date +%H%M)
          echo "New York weekday: $ny_day"
          echo "New York time: $ny_time"

          blocked=false
          if [ "$ny_day" -ge 1 ] && [ "$ny_day" -le 5 ] && [ "$ny_time" -ge 0900 ] && [ "$ny_time" -le 1000 ]; then
            blocked=true
          fi

          echo "blocked=$blocked" >> "$GITHUB_OUTPUT"

      - name: Skip deploy during market-open lock
        if: steps.deploy_window.outputs.blocked == 'true'
        run: echo "Skipping Firebase live deploy because current New York time is inside the 09:00-10:00 weekday lock window."

      - uses: actions/checkout@v4
        if: steps.deploy_window.outputs.blocked != 'true'

      - run: npm ci && npm run build
        if: steps.deploy_window.outputs.blocked != 'true'

      - uses: FirebaseExtended/action-hosting-deploy@v0
        if: steps.deploy_window.outputs.blocked != 'true'
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TRADINGAPP_84F28 }}
          channelId: live
          projectId: tradingapp-84f28
