# Catch-up deploy for commits that land on `main` during the market-open lock window.
# We schedule in UTC around the possible 10:05 ET slot and then gate on America/New_York
# inside the job so this keeps working across daylight saving time shifts.

name: Catch Up Firebase Hosting deploy after lock window

on:
  schedule:
    - cron: "*/5 14-15 * * 1-5"
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: firebase-hosting-live
      cancel-in-progress: false
    steps:
      - name: Check catch-up deploy window
        id: deploy_window
        run: |
          ny_day=$(TZ=America/New_York date +%u)
          ny_time=$(TZ=America/New_York date +%H%M)
          echo "New York weekday: $ny_day"
          echo "New York time: $ny_time"

          allowed=false
          if [ "$ny_day" -ge 1 ] && [ "$ny_day" -le 5 ] && [ "$ny_time" -ge 1005 ] && [ "$ny_time" -le 1014 ]; then
            allowed=true
          fi

          echo "allowed=$allowed" >> "$GITHUB_OUTPUT"

      - name: Skip outside catch-up window
        if: steps.deploy_window.outputs.allowed != 'true'
        run: echo "Skipping catch-up deploy because current New York time is outside the 10:05-10:14 weekday catch-up window."

      - uses: actions/checkout@v4
        if: steps.deploy_window.outputs.allowed == 'true'
        with:
          ref: main

      - run: npm ci && npm run build
        if: steps.deploy_window.outputs.allowed == 'true'

      - uses: FirebaseExtended/action-hosting-deploy@v0
        if: steps.deploy_window.outputs.allowed == 'true'
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TRADINGAPP_84F28 }}
          channelId: live
          projectId: tradingapp-84f28
